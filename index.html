<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FAQ Accordion</title>
    <link rel="stylesheet" href="./css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Work+Sans:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="wrapper">
        <div class="container">
            <div class="faq-block">
                <div class="faq-logo">
                    <img class="logo-star" src="./image/icon-star.svg" alt="Logo Star">
                    <p class="faq-logo-text">FAQs</p>
                </div>
                <ul class="faq-list">
                    <li class="question">What is Frontend Mentor, and how will it help me?<span class="question-switcher active"></span></li>
                    <li class="answer"></li>
                
                    <li class="question">Is Frontend Mentor free?<span class="question-switcher"></span></li>
                    <li class="answer hidden"></li>

                    <li class="question">Can I use Frontend Mentor projects in my portfolio?<span class="question-switcher"></span></li>
                    <li class="answer hidden"></li>

                    <li class="question">How can I get help if I'm stuck on a challenge?<span class="question-switcher"></span></li>
                    <li class="answer hidden"></li>
                </ul>
            </div>
        </div>
    </div>


    <script src="./js/script.js"></script>
</body>
</html>
